name: Wails Build

on:
  push:
    tags:
      - 'v*'

env:
  # Necessary for most environments as build failure can occur due to OOM issues
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build: [mac, windows, linux]
        include:
          - build: mac
            os: macos-latest
            platform: darwin/universal
          - build: windows
            os: windows-latest
            platform: windows/amd64
          - build: linux
            os: ubuntu-latest
            platform: linux/amd64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Build Wails App
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            wails build -platform ${{ matrix.platform }} -clean -m -tags webkit2_41
          else
            wails build -platform ${{ matrix.platform }} -clean -m
          fi

      - name: Compress macOS Binary
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent CullSnap.app CullSnap-macos-universal.zip

      - name: Rename Windows/Linux Binaries
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          cd build/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv CullSnap.exe CullSnap-windows-amd64.exe
          else
            mv CullSnap CullSnap-linux-amd64
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wails Builds (${{ matrix.build }})
          path: |
            build/bin/CullSnap-macos-universal.zip
            build/bin/CullSnap-windows-amd64.exe
            build/bin/CullSnap-linux-amd64

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*CullSnap-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
