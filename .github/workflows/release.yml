name: Wails Build

on:
  push:
    tags:
      - 'v*'

# Default: no permissions. Each job grants only what it needs.
permissions: {}

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  WAILS_VERSION: "v2.11.0"

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Upload CHANGELOG.md
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: changelog
          path: CHANGELOG.md

  build:
    needs: generate-changelog
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        build: [mac, windows, linux]
        include:
          - build: mac
            os: macos-latest
            platform: darwin/universal
          - build: windows
            os: windows-latest
            platform: windows/amd64
          - build: linux
            os: ubuntu-latest
            platform: linux/amd64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Download generated CHANGELOG.md
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: changelog

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.x'

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Build Wails App
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          GD_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GD_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
        run: |
          LDFLAGS="-X main.version=$VERSION -X main.googleDriveClientID=$GD_CLIENT_ID -X main.googleDriveClientSecret=$GD_CLIENT_SECRET"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            wails build -platform ${{ matrix.platform }} -clean -m -tags webkit2_41 -ldflags "$LDFLAGS"
          else
            wails build -platform ${{ matrix.platform }} -clean -m -ldflags "$LDFLAGS"
          fi

      - name: Ad-hoc sign macOS app bundle
        if: matrix.os == 'macos-latest'
        run: |
          codesign --force --deep --sign - build/bin/CullSnap.app
          echo "Verifying signature..."
          codesign -dv build/bin/CullSnap.app 2>&1

      - name: Compress macOS Binary
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent CullSnap.app CullSnap-macos-universal.zip

      - name: Extract standalone macOS binary
        if: matrix.os == 'macos-latest'
        run: |
          cp build/bin/CullSnap.app/Contents/MacOS/CullSnap build/bin/CullSnap-darwin-universal

      - name: Rename Windows/Linux Binaries
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          cd build/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv CullSnap.exe CullSnap-windows-amd64.exe
          else
            mv CullSnap CullSnap-linux-amd64
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: Wails Builds (${{ matrix.build }})
          path: |
            build/bin/CullSnap-macos-universal.zip
            build/bin/CullSnap-darwin-universal
            build/bin/CullSnap-windows-amd64.exe
            build/bin/CullSnap-linux-amd64

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Flatten and generate checksums
        run: |
          mkdir -p release_assets
          find artifacts -name 'CullSnap-*' -type f ! -name '*.zip' -exec cp {} release_assets/ \;
          cd release_assets
          sha256sum CullSnap-* | sort > checksums.txt
          cat checksums.txt

      - name: Sign checksums
        env:
          CULLSNAP_UPDATE_SIGNING_KEY: ${{ secrets.CULLSNAP_UPDATE_SIGNING_KEY }}
        run: |
          echo "$CULLSNAP_UPDATE_SIGNING_KEY" > /tmp/signing.pem
          openssl dgst -sha256 -sign /tmp/signing.pem -out release_assets/checksums.txt.sig release_assets/checksums.txt
          rm /tmp/signing.pem

      - name: Generate release changelog
        id: changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            artifacts/**/*CullSnap-*
            release_assets/checksums.txt
            release_assets/checksums.txt.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-docs:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Sync README to docs/index.md
        run: |
          cat > docs/index.md << 'HEADER'
          ---
          layout: default
          title: CullSnap
          ---

          <!-- This file is auto-generated from README.md by the post-release workflow. Do not edit manually. -->

          HEADER
          sed -i 's/^          //' docs/index.md
          cat README.md \
            | sed 's|src="build/appicon.png"|src="https://raw.githubusercontent.com/Abhishekmitra-slg/CullSnap/main/build/appicon.png"|g' \
            | sed 's|src="docs/assets/|src="assets/|g' \
            | sed 's|href="go.mod"|href="https://github.com/Abhishekmitra-slg/CullSnap"|g' \
            | sed 's|href="wails.json"|href="https://github.com/Abhishekmitra-slg/CullSnap"|g' \
            | sed 's|href="LICENSE"|href="https://github.com/Abhishekmitra-slg/CullSnap/blob/main/LICENSE"|g' \
            | sed 's|href="SECURITY.md"|href="https://github.com/Abhishekmitra-slg/CullSnap/blob/main/SECURITY.md"|g' \
            | sed 's|href="CONTRIBUTING.md"|href="https://github.com/Abhishekmitra-slg/CullSnap/blob/main/CONTRIBUTING.md"|g' \
            | sed 's|href="COMMERCIAL-LICENSE.md|href="https://github.com/Abhishekmitra-slg/CullSnap/blob/main/COMMERCIAL-LICENSE.md|g' \
            | sed 's|href="CODE_OF_CONDUCT.md"|href="https://github.com/Abhishekmitra-slg/CullSnap/blob/main/CODE_OF_CONDUCT.md"|g' \
            | sed '/^<p align="center">$/,/^<\/p>$/{ /Install.*Features.*Usage/d; /href="#-/d; }' \
            | sed '/^<p align="center">$/,/^<\/p>$/{/^$/d}' \
            | sed 's/^## ✨ /## /; s/^## 🏗️ /## /; s/^## 🛠️ /## /; s/^## 🎮 /## /; s/^## 📷 /## /; s/^## 📁 /## /; s/^## 🔒 /## /; s/^## 🤝 /## /; s/^## 📄 /## /; s/^## ⚖️ /## /' \
            | sed 's/^### 🍎 /### /' \
            >> docs/index.md
          printf '\n\n%s\n\n%s\n' '---' '<div class="legal-footer"><a href="privacy">Privacy Policy</a> · <a href="terms">Terms of Service</a></div>' >> docs/index.md

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          BRANCH="post-release/${TAG_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md docs/index.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: update CHANGELOG.md and GitHub Pages for ${TAG_NAME}"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: post-release updates for ${TAG_NAME}" \
            --body "Automated post-release updates:
          - Updated CHANGELOG.md with ${TAG_NAME} release notes
          - Synced README.md to docs/index.md for GitHub Pages" \
            --base main \
            --head "$BRANCH"

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download macOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: Wails Builds (mac)
          path: artifacts

      - name: Compute SHA256 and generate cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(sha256sum artifacts/CullSnap-macos-universal.zip | awk '{print $1}')
          echo "Version: $VERSION"
          echo "SHA256: $SHA256"
          sed -e "s/VERSION_PLACEHOLDER/$VERSION/" \
              -e "s/SHA256_PLACEHOLDER/$SHA256/" \
              homebrew/cullsnap.rb.template > cullsnap.rb
          cat cullsnap.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.CULLSNAP_HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/Abhishekmitra-slg/homebrew-tap.git /tmp/homebrew-tap
          cp cullsnap.rb /tmp/homebrew-tap/Casks/cullsnap.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/cullsnap.rb
          git diff --cached --quiet || git commit -m "Update CullSnap cask to ${GITHUB_REF_NAME}"
          git push
