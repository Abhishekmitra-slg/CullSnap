name: Wails Build

on:
  push:
    tags:
      - 'v*'

# Default: no permissions. Each job grants only what it needs.
permissions: {}

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  WAILS_VERSION: "v2.11.0"

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        build: [mac, windows, linux]
        include:
          - build: mac
            os: macos-latest
            platform: darwin/universal
          - build: windows
            os: windows-latest
            platform: windows/amd64
          - build: linux
            os: ubuntu-latest
            platform: linux/amd64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.x'

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Build Wails App
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            wails build -platform ${{ matrix.platform }} -clean -m -tags webkit2_41 -ldflags "-X main.version=$VERSION"
          else
            wails build -platform ${{ matrix.platform }} -clean -m -ldflags "-X main.version=$VERSION"
          fi

      - name: Compress macOS Binary
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent CullSnap.app CullSnap-macos-universal.zip

      - name: Rename Windows/Linux Binaries
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          cd build/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv CullSnap.exe CullSnap-windows-amd64.exe
          else
            mv CullSnap CullSnap-linux-amd64
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: Wails Builds (${{ matrix.build }})
          path: |
            build/bin/CullSnap-macos-universal.zip
            build/bin/CullSnap-windows-amd64.exe
            build/bin/CullSnap-linux-amd64

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/**/*CullSnap-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download macOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: Wails Builds (mac)
          path: artifacts

      - name: Compute SHA256 and generate cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(sha256sum artifacts/CullSnap-macos-universal.zip | awk '{print $1}')
          echo "Version: $VERSION"
          echo "SHA256: $SHA256"
          sed -e "s/VERSION_PLACEHOLDER/$VERSION/" \
              -e "s/SHA256_PLACEHOLDER/$SHA256/" \
              homebrew/cullsnap.rb.template > cullsnap.rb
          cat cullsnap.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/Abhishekmitra-slg/homebrew-tap.git /tmp/homebrew-tap
          cp cullsnap.rb /tmp/homebrew-tap/Casks/cullsnap.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/cullsnap.rb
          git diff --cached --quiet || git commit -m "Update CullSnap cask to ${GITHUB_REF_NAME}"
          git push

      - name: Push to homebrew-cullsnap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/Abhishekmitra-slg/homebrew-cullsnap.git /tmp/homebrew-cullsnap
          cp cullsnap.rb /tmp/homebrew-cullsnap/Casks/cullsnap.rb
          cd /tmp/homebrew-cullsnap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/cullsnap.rb
          git diff --cached --quiet || git commit -m "Update CullSnap cask to ${GITHUB_REF_NAME}"
          git push
