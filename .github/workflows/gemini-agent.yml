name: Gemini Cloud Agent

on:
  issue_comment:
    types: [created]

jobs:
  gemini-coder:
    if: contains(github.event.comment.body, '@gemini-cli') && !github.event.issue.pull_request
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Python (For Agent)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AI Agent CLI
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install aider-chat

      - name: Run Autonomous Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.comment.body }}
        run: |
          # Strip the trigger word from your phone command
          CLEAN_PROMPT=$(echo "$ISSUE_BODY" | sed 's/@gemini-cli//g')
          echo "Executing prompt: $CLEAN_PROMPT"
          
          # Setup dummy git credentials so the agent can read/write the tree
          git config --global user.name "Gemini Agent"
          git config --global user.email "agent@gemini.cloud"
          
          # Run the agent. It maps the repo, reads GEMINI.md, and modifies files in place.
          aider --model gemini/gemini-1.5-pro-latest --message "$CLEAN_PROMPT" --yes --no-auto-commits --read GEMINI.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Agent: Auto-generated code based on issue comment"
          title: "🤖 Agent PR: Resolved Issue #${{ github.event.issue.number }}"
          body: "This pull request was automatically generated by the Gemini Cloud Agent based on your mobile prompt."
          branch: "gemini-agent-update-${{ github.event.issue.number }}"
