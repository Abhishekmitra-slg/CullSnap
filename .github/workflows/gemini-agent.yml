name: Gemini Cloud Agent

on:
  issue_comment:
    types: [created]

jobs:
  gemini-coder:
    if: contains(github.event.comment.body, '@gemini-cli') && !github.event.issue.pull_request
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.comment.body }}
        run: |
          echo "Received command: $ISSUE_BODY"
          echo 'package main' > health_test.go
          echo 'import "testing"' >> health_test.go
          echo 'func TestHealth(t *testing.T) {}' >> health_test.go

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Agent: Auto-generated code based on issue comment"
          title: "🤖 Agent PR: Resolved Issue #${{ github.event.issue.number }}"
          body: "This pull request was automatically generated by the Gemini Cloud Agent."
          branch: "gemini-agent-update-${{ github.event.issue.number }}"
