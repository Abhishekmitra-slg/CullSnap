name: Gemini Cloud Agent

on:
  issue_comment:
    types: [created, edited]

jobs:
  gemini-coder:
    if: contains(github.event.comment.body, '@gemini-cli') && !github.event.issue.pull_request
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Setup Python (For Agent)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install AI Agent CLI
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install aider-chat

      - name: Run Autonomous Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.comment.body }}
        run: |
          # Strip the trigger word from your phone command
          CLEAN_PROMPT=$(echo "$ISSUE_BODY" | sed 's/@gemini-cli//g')
          echo "Executing prompt: $CLEAN_PROMPT"
          
          # Setup git credentials
          git config --global user.name "Abhishek Mitra"
          git config --global user.email "Abhishekmitra-slg@users.noreply.github.com"
          
          # Run the agent. It maps the repo, reads GEMINI.md, and modifies files in place.
          aider --model gemini/gemini-2.5-pro --message "$CLEAN_PROMPT" --yes --no-auto-commits --read GEMINI.md


      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "fix: Implement changes requested in issue #${{ github.event.issue.number }}"
          title: "fix: Resolve issue #${{ github.event.issue.number }} via Gemini Agent"
          body: |
            This pull request was automatically generated by the Gemini Cloud Agent based on an issue comment.
            
            Resolves #${{ github.event.issue.number }}
          branch: "gemini-agent-update-${{ github.event.issue.number }}"
          author: "Abhishek Mitra <Abhishekmitra-slg@users.noreply.github.com>"
          committer: "Abhishek Mitra <Abhishekmitra-slg@users.noreply.github.com>"
