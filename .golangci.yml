run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - gofumpt
    - gocritic
    - misspell

linters-settings:
  gosec:
    excludes:
      - G304 # File path provided as taint input — expected for a file-serving desktop app
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam # Desktop app, not a hot path concern

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 5
