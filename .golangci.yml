version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofumpt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - gocritic
    - misspell
  settings:
    gosec:
      excludes:
        - G304 # File path provided as taint input — expected for a file-serving desktop app
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam

issues:
  exclude-rules:
    - path: ".*_test\\.go"
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 5
