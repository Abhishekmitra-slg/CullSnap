[changelog]
header = """# Changelog\n
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
<!-- generated by git-cliff -->\n"""
body = """
{%- if version %}
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{% for group, commits in commits \
    | filter(attribute="merge_commit", value=false) \
    | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | split(pat="\n") | first | upper_first | trim }}\
{% endfor %}
{% endfor %}\n"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"

commit_parsers = [
    { message = "^chore\\(release\\)", skip = true },
    { message = "^docs: update CHANGELOG", skip = true },

    { message = "^.*!(.*)$", group = "<!-- 0 -->Breaking Changes" },
    { body = ".*BREAKING CHANGE.*", group = "<!-- 0 -->Breaking Changes" },

    { message = "^feat", group = "<!-- 2 -->Features" },

    { message = "^fix\\(security\\)", group = "<!-- 1 -->Security" },
    { message = "^fix\\(deps\\).*(?i)(CVE|vulnerability|GHSA|GO-\\d{4})", group = "<!-- 1 -->Security" },

    { message = "^fix", group = "<!-- 3 -->Bug Fixes" },

    { message = "^doc", group = "<!-- 4 -->Documentation" },

    { message = "^perf", group = "<!-- 5 -->Performance" },

    { message = "^refactor", group = "<!-- 6 -->Miscellaneous" },
    { message = "^style", group = "<!-- 6 -->Miscellaneous" },
    { message = "^test", group = "<!-- 6 -->Miscellaneous" },
    { message = "^chore", group = "<!-- 6 -->Miscellaneous" },
    { message = "^ci", group = "<!-- 6 -->Miscellaneous" },
]
